---
layout: default
---

<article class="post">
  <div class="post-head">
    <h1>{{ page.title }}</h1>
    <p class="date">{{ page.date | date: "%B %d, %Y" }}</p>
  </div>
  {% if page.description %}
  <p class="description">{{ page.description }}</p>
  {% endif %}

  {% if page.image %}
  <p class="post-image"><img src="{{ site.baseurl }}{{ page.image }}" alt=""></p>
  {% endif %}

  {{ content }}

  <p class="back"><a href="{{ site.baseurl }}/blog/">Back to Blog</a></p>
</article>
