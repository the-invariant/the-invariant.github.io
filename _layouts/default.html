<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var key = "the-invariant-mode";
      var mode = null;

      try {
        mode = window.localStorage.getItem(key);
      } catch (e) {
        mode = null;
      }

      if (mode !== "dark" && mode !== "light") {
        mode = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      document.documentElement.setAttribute("data-bs-theme", mode);
    }());
  </script>
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% assign meta_description = page.description | default: site.description %}
  <meta name="description" content="{{ meta_description | escape }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% if page.robots %}
  <meta name="robots" content="{{ page.robots }}">
  {% endif %}
  {% feed_meta %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="wrap" class="site-wrap">
    <div class="container pt-4 pt-lg-5">
      {% include header.html %}
    </div>

    <main id="main-content" class="site-main container py-4" tabindex="-1">
      <div class="row gx-0 gy-4 site-content-row">
        <div id="content" class="col-lg-8 pe-lg-4">
          {{ content }}
        </div>

        {% include sidebar.html %}
      </div>
    </main>

    <div class="container pb-4 pb-lg-5">
      {% include footer.html %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
  {% if page.url == "/search/" %}
  <script src="{{ site.baseurl }}/assets/js/search.js"></script>
  {% endif %}
</body>
</html>
